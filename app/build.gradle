android {
    namespace 'com.antuo.user'
    compileSdk 34

    defaultConfig {
        applicationId "com.antuo.user"
        minSdk 21
        targetSdk 34
        versionCode 5
        versionName "1.0.4"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // FileProvider 需要 androidx.core
    implementation 'androidx.core:core:1.12.0'
}
